name: GitHub Pages Astro CI

on:
  # 每次推送到 `main` 分支时触发
  push:
    branches: [ master ]
  # 允许在 GitHub Actions 面板手动触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Install, build, and upload your site
        uses: withastro/action@v6


  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v6  # 或 @v4
        with:
          version: 11.5.3  # 填入你需要的具体版本号，如 8.15.0 或 9